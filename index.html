<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>game xam lox</title>
  <style>
    :root {
      --cyan: #0ff;
      --matrix-bg: #000500;
      --bullet-time-bg: #100;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Courier New', Courier, monospace;
      background-color: #000;
      color: #33ff33;
      overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
      transition: background-color 0.2s;
      box-sizing: border-box;
    }
    body.bullet-time-active {
      background-color: var(--bullet-time-bg);
    }
    h1 { margin: 5px 0; font-size: 2.2em; text-shadow: 0 0 10px #3f3; color: #fff; text-transform: uppercase; text-align: center;}
    
    #stats { display: flex; gap: 10px; font-size: 1.1em; margin-bottom: 5px; font-weight: bold; width: 95%; max-width: 800px; justify-content: space-between; flex-wrap: wrap;}
    
    #gameWrapper { position: relative; border: 3px solid #3f3; box-shadow: 0 0 25px #0a0; border-radius: 12px; overflow: hidden; width: 95%; max-width: 800px; display: flex; justify-content: center; align-items: center;}
    #gameCanvas { display: block; background: var(--matrix-bg); transition: background 0.3s; width: 100%; height: auto; aspect-ratio: 8/5; object-fit: contain; }
    
    #gameWrapper.troll-time #gameCanvas { background: #330000; border-color: #f00; box-shadow: 0 0 25px #f00; }

    #dodgeEnergyBarWrapper {
      position: absolute; top: 10px; left: 10px; width: 250px; max-width: 40%; height: 18px;
      border: 2px solid #3f3; border-radius: 10px; overflow: hidden; background: #000; z-index: 2;
    }
    #gameWrapper.troll-time #dodgeEnergyBarWrapper { border-color: #f00; }
    #dodgeEnergyBar {
      width: 100%; height: 100%; background: #0a0;
      transition: width 0.1s linear, background 0.3s;
    }
    #gameWrapper.troll-time #dodgeEnergyBar { background: #f00; }

    #webcamWrapper {
      position: absolute; bottom: 10px; right: 10px;
      width: 140px; height: 100px;
      border: 2px solid rgba(0, 255, 0, 0.4); border-radius: 8px;
      opacity: 0.6; overflow: hidden; background: #000;
      transition: border-color 0.3s; z-index: 2;
    }
    #webcamWrapper video, #webcamWrapper canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover;
    }
    
    .btn {
      padding: 12px 40px; font-size: 1.3em; font-family: 'Courier New', Courier, monospace; font-weight: bold;
      background: #000; color: #3f3; border: 2px solid #3f3; border-radius: 8px;
      cursor: pointer; margin-top: 20px; text-transform: uppercase; box-shadow: 0 0 15px #0a0; transition: 0.2s;
    }
    .btn:hover { background: #3f3; color: #000; }
    
    #overlayMenu {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10;
    }
    #msg { font-size: 2em; margin-bottom: 25px; text-align: center; line-height: 1.4; color: #fff; padding: 0 15px;}
    #score_final { color: #f00; font-size: 1.8em; font-weight: bold;}

    @media (max-width: 600px) {
      h1 { font-size: 1.5em; }
      #webcamWrapper { width: 100px; height: 75px; }
      .btn { padding: 10px 20px; font-size: 1em; }
      #msg { font-size: 1.3em; }
      #score_final { font-size: 1.5em; }
    }
    
    /* Hiệu ứng chớp màn hình khi dùng chiêu cuối */
    #flashOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8); z-index: 5;
      opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }
    .flash-active { opacity: 1 !important; transition: opacity 0s !important; }
  </style>
</head>
<body>

  <h1>CẤP ĐỘ đơn giản nhất </h1>
  <div id="stats">
    <div id="scoreDisplay">sinh tồn : 0s</div>
    <div id="aiStatus" style="color:red">tôi đag bị lag </div>
  </div>

  <div id="gameWrapper">
    <div id="flashOverlay"></div> <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div id="dodgeEnergyBarWrapper"><div id="dodgeEnergyBar"></div></div>

    <div id="webcamWrapper">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="poseCanvas"></canvas>
    </div>

    <div id="overlayMenu">
      <div id="msg">AI ĐANG QUÉT CƠ THỂ xấu xí của BẠN...</div>
      <button id="startBtn" class="btn" style="display: none;">chúc bạn may mắn </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <script>
    const video = document.getElementById('webcam');
    const poseCanvas = document.getElementById('poseCanvas');
    const pCtx = poseCanvas.getContext('2d');
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const gameWrapper = document.getElementById('gameWrapper');
    const startBtn = document.getElementById('startBtn');
    const overlayMenu = document.getElementById('overlayMenu');
    const msgEl = document.getElementById('msg');
    const scoreEl = document.getElementById('scoreDisplay');
    const aiStatusEl = document.getElementById('aiStatus');
    const dodgeEnergyBar = document.getElementById('dodgeEnergyBar');
    const flashOverlay = document.getElementById('flashOverlay');

    let detector;
    let isAIReady = false;

    // --- BIẾN ẨN: NHẬN DIỆN LẮC ĐẦU (KHIÊN) ---
    let lastNoseX = 0;
    let shakeDir = 0; 
    let shakeCount = 0;
    let lastShakeTime = 0;

    // --- BIẾN ẨN: NHẬN DIỆN GẬT ĐẦU (CHIÊU CUỐI XÓA MÀN) ---
    let lastNoseY = 0;
    let nodDir = 0;
    let nodCount = 0;
    let lastNodTime = 0;

    // --- PLAYER (Điểm mũi) ---
    const player = {
      x: canvas.width / 2, y: canvas.height / 2,
      radius: 16,
      targetX: canvas.width / 2, targetY: canvas.height / 2,
      hitboxRadius: 10,
      hasShield: false
    };

    function lerp(start, end, factor) { return start + (end - start) * factor; }

    // --- HÀM CHIÊU CUỐI: XÓA CHƯỚNG NGẠI VẬT ---
    function triggerUltimateClear() {
      if (bullets.length === 0) return; // Không có gì thì không kích hoạt
      
      // Tạo hạt nổ tại vị trí của từng viên đạn hiện tại (Hạt màu đỏ/cam)
      bullets.forEach(b => {
        createParticles(b.x, b.y, "rgba(255, 69, 0, 1)"); 
      });

      bullets = []; // XÓA SẠCH ĐẠN
      screenShake = 25; // Rung màn hình cực mạnh
      
      // Chớp sáng màn hình
      flashOverlay.classList.add('flash-active');
      setTimeout(() => { flashOverlay.classList.remove('flash-active'); }, 50);
    }

    // --- AI MOVENET SETUP ---
    async function initAI() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: "user" } 
        });
        video.srcObject = stream;
        
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            poseCanvas.width = video.videoWidth; poseCanvas.height = video.videoHeight;
            video.play(); resolve();
          };
        });

        detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER });
        
        isAIReady = true;
        aiStatusEl.innerText = "tận hưởng đi "; aiStatusEl.style.color = "#0f0";
        startBtn.style.display = "block";
        detectPose();
      } catch (err) {
        aiStatusEl.innerText = "CAMERA LỖI!";
        msgEl.innerText = "Không thể truy cập Camera.\nGame này cần camera để né!";
      }
    }

    async function detectPose() {
      if (!isAIReady) return;
      const poses = await detector.estimatePoses(video);
      pCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

      if (poses.length > 0) {
        const keypoints = poses[0].keypoints;
        const nose = keypoints.find(k => k.name === 'nose');

        if (nose && nose.score > 0.3) {
          pCtx.fillStyle = "cyan"; pCtx.beginPath(); pCtx.arc(nose.x, nose.y, 6, 0, Math.PI*2); pCtx.fill();
          player.targetX = canvas.width - (nose.x / video.videoWidth) * canvas.width;
          player.targetY = (nose.y / video.videoHeight) * canvas.height;
          let now = Date.now();

          // 1. LOGIC ẨN: THEO DÕI LẮC ĐẦU (Trái - Phải) -> Lấy Khiên
          let dx = player.targetX - lastNoseX;
          if (Math.abs(dx) > 15) { 
            let currentDir = dx > 0 ? 1 : -1;
            if (currentDir !== shakeDir) { 
              if (now - lastShakeTime < 500) {
                shakeCount++;
                if (shakeCount >= 3) { 
                  if (!player.hasShield) player.hasShield = true;
                  shakeCount = 0; 
                }
              } else { shakeCount = 1; }
              shakeDir = currentDir;
              lastShakeTime = now;
            }
          }
          lastNoseX = player.targetX;

          // 2. LOGIC MỚI: THEO DÕI GẬT ĐẦU (Lên - Xuống) -> Xóa toàn bộ đạn
          let dy = player.targetY - lastNoseY;
          if (Math.abs(dy) > 15) { // Cử động lên/xuống đủ mạnh
            let currentNodDir = dy > 0 ? 1 : -1;
            if (currentNodDir !== nodDir) {
              if (now - lastNodTime < 600) { // Đảo chiều nhanh (Gật liên tục)
                nodCount++;
                if (nodCount >= 4) { // 4 nhịp đảo chiều (~2 cú gật trọn vẹn)
                  triggerUltimateClear();
                  nodCount = 0; // Reset đếm
                }
              } else { nodCount = 1; }
              nodDir = currentNodDir;
              lastNodTime = now;
            }
          }
          lastNoseY = player.targetY;

        }
      }
      requestAnimationFrame(detectPose);
    }
    initAI();

    // --- GAME ENGINE ---
    let bullets = [];
    let particles = [];
    let gameLoopId;
    let isGameRunning = false;
    let score = 0;
    let frames = 0;
    let screenShake = 0;

    const trollEmojis = ["🧱", "💩", "🍅", "💣"];
    const toxicMatrixChars = ["!", "@", "#", "$", "%", "*", "(", ")"];

    class Bullet {
      constructor(type) {
        this.type = type || trollEmojis[Math.floor(Math.random() * trollEmojis.length)];
        this.radius = 12;
        this.id = Math.random();
        
        if (this.type === "🧱") { 
          this.radius = 18; this.x = Math.random() * canvas.width; this.y = -50;
          this.vx = 0; this.vy = 4 + (score / 150);
        } else if (this.type === "💩") { 
          this.radius = 15; this.x = (Math.random() < 0.5 ? -30 : canvas.width + 30); this.y = Math.random() * canvas.height;
          this.vx = (Math.random() < 0.5 ? 2 : -2); this.vy = (Math.random() < 0.5 ? 2 : -2);
          this.homingFactor = 0.01 + (score / 30000);
          this.age = 0; 
        } else { 
          this.radius = 12;
          let edge = Math.floor(Math.random() * 2); 
          this.x = (edge === 0 ? canvas.width + 30 : -30); this.y = Math.random() * canvas.height;
          this.vx = (edge === 0 ? -1 : 1) * (3 + (score / 200)); this.vy = (Math.random() - 0.5) * 3;
        }
      }
      
      update() {
        this.x += this.vx; this.y += this.vy;
        
        if (this.type === "💩") { 
          this.age++;
          let cycle = this.age % 360; 
          
          if (cycle < 180) { 
            this.vx += (player.x - this.x) * this.homingFactor;
            this.vy += (player.y - this.y) * this.homingFactor;
            let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            let limit = 4 + (score / 200);
            if (speed > limit) { this.vx = (this.vx/speed) * limit; this.vy = (this.vy/speed) * limit; }
          }
        }
      }
      
      draw() { 
        ctx.font = `${this.radius * 2}px Arial`; 
        if (this.type === "💩" && this.age % 360 >= 180) ctx.globalAlpha = 0.4; 
        else ctx.globalAlpha = 1.0;
        ctx.fillText(this.type, this.x, this.y); 
        ctx.globalAlpha = 1.0; 
      }
    }

    // --- HIỆU ỨNG HẠT VỠ (Sửa lại để tùy biến màu sắc) ---
    function createParticles(x, y, color = "rgba(0, 255, 255, 1)") {
      for (let i = 0; i < 20; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10,
          radius: Math.random() * 4 + 1,
          life: 1,
          color: color 
        });
      }
    }

    let matrixDrops = [];
    let matrixStrings = [];
    const columns = Math.floor(canvas.width / 18);
    for(let i=0; i<columns; i++) {
      matrixDrops[i] = Math.random() * canvas.height;
      matrixStrings[i] = Array(20).fill("").map(() => String.fromCharCode(0x30A0 + Math.random() * 96));
    }

    function drawMatrixBackground() {
      ctx.fillStyle = "rgba(0, 8, 0, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0a0"; ctx.font = "14px monospace"; ctx.textAlign = "left";
      for(let i=0; i<matrixDrops.length; i++) {
        let char = matrixStrings[i][Math.floor(frames % 20)];
        if (Math.random() < 0.005) char = toxicMatrixChars[Math.floor(Math.random() * toxicMatrixChars.length)];
        ctx.fillText(char, i * 18, matrixDrops[i]);
        matrixDrops[i] += 8;
        if(matrixDrops[i] > canvas.height && Math.random() > 0.98) { matrixDrops[i] = 0; matrixStrings[i] = matrixStrings[i].map(() => String.fromCharCode(0x30A0 + Math.random() * 96)); }
      }
    }

    function updateGame() {
      player.x = lerp(player.x, player.targetX, 0.4);
      player.y = lerp(player.y, player.targetY, 0.4);

      let spawnRate = Math.max(10, 50 - Math.floor(score / 150));
      if (frames % spawnRate === 0) {
        bullets.push(new Bullet());
        if (Math.random() < 0.3) bullets.push(new Bullet("🧱")); 
        if (Math.random() < 0.1) bullets.push(new Bullet("💩")); 
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.update();
        if (b.x < -100 || b.x > canvas.width + 100 || b.y < -100 || b.y > canvas.height + 100) { bullets.splice(i, 1); continue; }

        let dx = b.x - player.x; let dy = b.y - player.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < player.hitboxRadius + b.radius - 8) { 
          if (player.hasShield) {
            player.hasShield = false;
            bullets.splice(i, 1);
            screenShake = 10;
            createParticles(player.x, player.y, "rgba(0, 255, 255, 1)"); // Vỡ khiên màu xanh
          } else {
            gameOver(); 
          }
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        if (p.life <= 0) particles.splice(i, 1);
      }

      screenShake = Math.max(0, screenShake - 1);
      frames++;
      if (frames % 60 === 0) { score++; scoreEl.innerText = `hưởng dương: ${score}s`; }
    }

    function renderGame() {
      ctx.save();
      if (screenShake > 0) ctx.translate((Math.random()-0.5) * screenShake, (Math.random()-0.5) * screenShake);
      drawMatrixBackground();
      bullets.forEach(b => b.draw());

      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
      });

      if (player.hasShield) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius + 15, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "rgba(0, 255, 255, 0.2)";
        ctx.fill();
      }

      ctx.fillStyle = "#fff"; ctx.font = "24px Arial"; ctx.textAlign = "center";
      ctx.fillText("😎", player.x, player.y);
      ctx.restore();
    }

    function gameLoop() {
      if (isGameRunning) {
        updateGame(); renderGame(); gameLoopId = requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      overlayMenu.style.display = "none";
      isGameRunning = true;
      score = 0; frames = 0; bullets = []; particles = []; screenShake = 0;
      player.hasShield = false; 
      nodCount = 0; shakeCount = 0; // Đặt lại bộ đếm khiên và gật
      scoreEl.innerText = "cố gắng: 0s";
      gameLoop();
    }

    function gameOver() {
  isGameRunning = false; 
  cancelAnimationFrame(gameLoopId);
  overlayMenu.style.display = "flex";
  
  // Logic xét số giây sống để khịa (Đã sắp xếp đúng thứ tự)
  let failMsg = "hơi non !"; // Nếu sống được 1 giây thì ra câu này
  
  if (score < 15) {
    failMsg = "gà thế không biết ? THỬ LẠI ĐI!";
  } else if (score >= 40) { // Sống từ 3 giây trở lên
    failMsg = " chúc mừng bạn đã nhận được phần thưởng từ chủ phát hành game !";
  } else if (score >= 25) { // Sống được 2 giây
    failMsg = " CŨNG KHÉT ĐẤY!\nNHƯNG VẪN CHẾT con gà à.";
  }

  // Thay chữ "tuổi thọ" thành "số giây sống"
  msgEl.innerHTML = `${failMsg}<br>số giây sống : <span id="score_final">${score} giây</span>`;
  
  startBtn.innerText = " (caydodai)";
  startBtn.style.display = "block";
}

    startBtn.addEventListener('click', startGame);

  </script>
</body>
</html>
